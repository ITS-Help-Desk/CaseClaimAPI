server {
    listen 80;
    server_name _;

    # Root is the CaseFlow project directory (not src/)
    # so that imports like ../../config.js resolve correctly
    # Structure: /var/www/caseflow/config.js
    #            /var/www/caseflow/src/index.html
    #            /var/www/caseflow/src/components/...
    root /var/www/caseflow;

    # Default page
    location = / {
        rewrite ^ /src/index.html last;
    }

    # API requests - proxy to Django/Daphne
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket connections
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Django REST Framework static files (browsable API)
    location /static/ {
        alias /home/helpdesk/Desktop/CaseClaimAPI/staticfiles/;
    }

    # Serve frontend static files (JS, CSS, etc.)
    location /src/ {
        try_files $uri $uri/ =404;
    }

    location /config.js {
        try_files $uri =404;
    }
}
